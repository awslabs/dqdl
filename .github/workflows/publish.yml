name: Publish to Maven Central

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version (e.g., 1.1.0)'
        required: true
      dry_run:
        description: 'Dry run (skip actual deploy)'
        type: boolean
        default: false

permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Configure AWS credentials
        if: ${{ !inputs.dry_run }}
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: arn:aws:iam::059379938386:role/GitHubActionsDqdlPublish
          aws-region: us-east-1

      - name: Fetch secrets from AWS Secrets Manager
        if: ${{ !inputs.dry_run }}
        id: secrets
        run: |
          KEY_FILE=$(mktemp)
          echo "KEY_FILE=$KEY_FILE" >> $GITHUB_OUTPUT

          GPG_PASSPHRASE=$(aws secretsmanager get-secret-value --secret-id gpg_passphrase --query SecretString --output text)
          echo "::add-mask::$GPG_PASSPHRASE"
          echo "GPG_PASSPHRASE=$GPG_PASSPHRASE" >> $GITHUB_OUTPUT

          CENTRAL_TOKEN=$(aws secretsmanager get-secret-value --secret-id central_portal_token --query SecretString --output text)
          echo "::add-mask::$CENTRAL_TOKEN"
          CENTRAL_USERNAME=$(echo "$CENTRAL_TOKEN" | jq -r 'keys[0]')
          CENTRAL_PASSWORD=$(echo "$CENTRAL_TOKEN" | jq -r 'to_entries[0].value')
          echo "::add-mask::$CENTRAL_USERNAME"
          echo "::add-mask::$CENTRAL_PASSWORD"
          echo "CENTRAL_USERNAME=$CENTRAL_USERNAME" >> $GITHUB_OUTPUT
          echo "CENTRAL_PASSWORD=$CENTRAL_PASSWORD" >> $GITHUB_OUTPUT

          aws secretsmanager get-secret-value --secret-id gpg_private_key --query SecretString --output text > "$KEY_FILE"

      - name: Set up JDK 11
        uses: actions/setup-java@6a0805fcefea3d4657a47ac4c165951e33482018 # v4.2.2
        with:
          java-version: '11'
          distribution: 'corretto'
          cache: maven

      - name: Import GPG key
        if: ${{ !inputs.dry_run }}
        run: |
          mkdir -p ~/.gnupg
          echo "use-agent" > ~/.gnupg/gpg.conf
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          echo "allow-loopback-pinentry" > ~/.gnupg/gpg-agent.conf
          chmod 700 ~/.gnupg
          chmod 600 ~/.gnupg/gpg.conf
          gpg --batch --import "$KEY_FILE"
          rm -f "$KEY_FILE"
        env:
          KEY_FILE: ${{ steps.secrets.outputs.KEY_FILE }}

      - name: Configure Maven settings
        if: ${{ !inputs.dry_run }}
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << EOF
          <settings>
            <servers>
              <server>
                <id>central</id>
                <username>${CENTRAL_USERNAME}</username>
                <password>${CENTRAL_PASSWORD}</password>
              </server>
            </servers>
            <profiles>
              <profile>
                <id>release</id>
                <properties>
                  <gpg.executable>gpg</gpg.executable>
                  <gpg.passphrase>${GPG_PASSPHRASE}</gpg.passphrase>
                </properties>
              </profile>
            </profiles>
            <activeProfiles>
              <activeProfile>release</activeProfile>
            </activeProfiles>
          </settings>
          EOF
        env:
          CENTRAL_USERNAME: ${{ steps.secrets.outputs.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ steps.secrets.outputs.CENTRAL_PASSWORD }}
          GPG_PASSPHRASE: ${{ steps.secrets.outputs.GPG_PASSPHRASE }}

      - name: Update version in pom.xml
        run: |
          mvn versions:set -DnewVersion="${RELEASE_VERSION}" -DgenerateBackupPoms=false
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}

      - name: Build and Deploy
        if: ${{ !inputs.dry_run }}
        run: mvn clean deploy -P release --batch-mode
        env:
          GPG_TTY: $(tty)

      - name: Dry Run Build
        if: ${{ inputs.dry_run }}
        run: mvn clean verify --batch-mode

      - name: Summary
        run: |
          if [ "${DRY_RUN}" = "true" ]; then
            echo "### Dry run completed for dqdl ${RELEASE_VERSION}" >> $GITHUB_STEP_SUMMARY
          else
            echo "### Published dqdl ${RELEASE_VERSION}" >> $GITHUB_STEP_SUMMARY
            echo "View at: https://central.sonatype.com" >> $GITHUB_STEP_SUMMARY
          fi
        env:
          DRY_RUN: ${{ inputs.dry_run }}
          RELEASE_VERSION: ${{ inputs.release_version }}

      - name: Cleanup sensitive files
        if: always()
        run: |
          rm -rf ~/.gnupg
          rm -rf ~/.m2/settings.xml
          rm -f "${KEY_FILE:-}"
        env:
          KEY_FILE: ${{ steps.secrets.outputs.KEY_FILE }}

  bump-version:
    needs: publish
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Set up JDK 11
        uses: actions/setup-java@6a0805fcefea3d4657a47ac4c165951e33482018 # v4.2.2
        with:
          java-version: '11'
          distribution: 'corretto'

      - name: Bump version and create PR
        run: |
          IFS='.' read -r MAJOR MINOR PATCH <<< "${RELEASE_VERSION}"
          NEXT_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          BRANCH_NAME="bump-version-${NEXT_VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "${BRANCH_NAME}"
          mvn versions:set -DnewVersion="${NEXT_VERSION}" -DgenerateBackupPoms=false
          git add pom.xml
          git commit -m "Update version in pom.xml to ${NEXT_VERSION}"
          git push origin "${BRANCH_NAME}"

          gh pr create \
            --base master \
            --head "${BRANCH_NAME}" \
            --title "Update version in pom.xml to ${NEXT_VERSION}" \
            --body "Automated version bump after publishing ${RELEASE_VERSION} to Maven Central."
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
          GH_TOKEN: ${{ github.token }}
